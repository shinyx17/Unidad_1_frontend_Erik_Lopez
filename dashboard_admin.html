<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - SportClub</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="CSS/login.css">
    <script src="users.js"></script>
</head>
<body class="dashboard admin">
    <header class="site-header admin-theme">
        <div class="logo-container">
            <div class="logo-placeholder">
                <img src="CSS/logo_empresa_letra_v1.png" alt="SportClub logo">
            </div>
        </div>
        <nav class="main-nav">
            <a href="dashboard_admin.html">Usuarios</a>
            <a href="dashboard_admin.html#reportes">Reportes</a>
            <a href="dashboard_admin.html#config">Configuración</a>
        </nav>
        <div class="header-actions">
            <a class="btn-small" href="edit_profile.html">Editar perfil</a>
            <a class="btn-small" href="login.html" onclick="logout()">Cerrar sesión</a>
        </div>
    </header>

    <main class="container admin-layout">
        <header class="card admin-panel">
            <h2>Panel de Administración</h2>
            <p id="welcome-message">Bienvenido, Admin</p>
        </header>

        <div class="admin-grid">
            <section class="card users-management">
                <h3>Gestión de Usuarios</h3>
                <table>
                    <thead><tr><th>Nombre</th><th>Email</th><th>Rol Actual</th><th>Cambiar a</th><th></th></tr></thead>
                    <tbody id="users-table-body">
                        <!-- Se llena dinámicamente con JavaScript -->
                    </tbody>
                </table>
            </section>

            <section class="card stats-system">
                <h3>Estadísticas del Sistema</h3>
                <div id="stats-content">
                    <!-- Se llena dinámicamente con JavaScript -->
                </div>
            </section>

            <section class="card reports">
                <h3>Reportes Generales</h3>
                <div class="report-row"><span>Informe Mensual</span><button class="primary-btn">Descargar</button></div>
                <div class="report-row"><span>Abril</span><button class="primary-btn">Descargar</button></div>
                <div style="margin-top:16px;"><button class="accent-btn">Configurar...</button></div>
            </section>
        </div>
    </main>

    <script>
        // Mostrar nombre del usuario logueado
        const user = getLoggedInUser();
        if (user) {
            document.getElementById('welcome-message').innerHTML = `Bienvenido, Admin <strong>${user.name}</strong>`;
        } else {
            // Si no hay usuario logueado, redirigir a login
            window.location.href = 'login.html';
        }

        // Cargar usuarios en la tabla
        function loadUsersTable() {
            const currentUsers = loadUsersFromLocalStorage();
            const tbody = document.getElementById('users-table-body');
            tbody.innerHTML = '';

            currentUsers.forEach(u => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${u.name}</td>
                    <td>${u.email}</td>
                    <td>${u.role}</td>
                    <td>
                        <select class="role-select" data-email="${u.email}">
                            <option value="user" ${u.role === 'user' ? 'selected' : ''}>Usuario</option>
                            <option value="coach" ${u.role === 'coach' ? 'selected' : ''}>Coach</option>
                            <option value="admin" ${u.role === 'admin' ? 'selected' : ''}>Admin</option>
                        </select>
                    </td>
                    <td><button class="primary-btn update-role-btn" data-email="${u.email}">Guardar</button></td>
                `;
                tbody.appendChild(row);
            });

            // Agregar event listeners a los botones
            document.querySelectorAll('.update-role-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const email = this.getAttribute('data-email');
                    const select = document.querySelector(`.role-select[data-email="${email}"]`);
                    const newRole = select.value;
                    const row = this.closest('tr');
                    
                    if (updateUserRole(email, newRole)) {
                        // Agregar clase de animación según el rol
                        row.classList.add(`role-highlight-${newRole}`);
                        
                        // Después de que termine la animación (2.4s = 0.8s * 3 flashes), actualizar la tabla
                        setTimeout(() => {
                            row.classList.remove(`role-highlight-${newRole}`);
                            loadUsersTable();
                        }, 2400);
                    }
                });
            });
        }

        // Cargar tabla al iniciar
        loadUsersTable();
    </script>
</body>
</html>
