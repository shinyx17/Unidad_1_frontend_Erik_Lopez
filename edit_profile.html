<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil - SportClub</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="CSS/login.css">
</head>
<body>
    <header class="site-header edit-profile">
        <div class="logo-container">
            <div class="logo-placeholder">
                <img src="CSS/logo_empresa_letra_v1.png" alt="SportClub logo">
            </div>
        </div>
        <nav class="main-nav">
            <a href="dashboard_user.html">Volver</a>
        </nav>
    </header>

    <main class="container">
        <h1>Editar Perfil</h1>
        <form class="simple-form">
            <label>Nombre completo
                <input type="text" name="name" value="Juan Pérez">
            </label>
            <label>Correo
                <input type="email" name="email" value="juan@example.com">
            </label>
            <label>Interés
                <input type="text" name="interest" value="CrossFit">
            </label>
            <button class="btn-ingresar">Guardar cambios</button>
        </form>
    </main>
</body>
</html>
