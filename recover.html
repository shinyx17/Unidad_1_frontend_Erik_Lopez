<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña - SportClub</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="CSS/login.css">
</head>
<body>
    <header class="site-header user-theme">
        <div class="logo-container">
            <div class="logo-placeholder">
                <img src="CSS/logo_empresa_letra_v1.png" alt="SportClub logo">
            </div>
        </div>
        <nav class="main-nav">
            <a href="login.html">Iniciar sesión</a>
            <a href="register.html">Registro</a>
        </nav>
    </header>

    <main class="container">
        <h1>Recuperar contraseña</h1>
        <form class="simple-form">
            <label>Correo
                <input type="email" name="email" placeholder="correo@sportclub.cl" required>
            </label>
            <button class="btn-ingresar">Enviar</button>
        </form>
        <p class="muted">Se enviará un enlace de recuperación si el correo existe en el sistema.</p>
    </main>
</body>
</html>
