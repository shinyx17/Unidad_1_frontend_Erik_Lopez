<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Tu Gimnasio</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="CSS/login.css">
</head>
<body class="auth-page">

    <div class="main-wrapper">
        <div class="login-box">
            
            <div class="logo-container">
                <div class="logo-placeholder">
                    <img src="CSS/logo_empresa_letra_v1.png" alt="Logo de la empresa">
                </div>
            </div>


            <form id="login-form">
                <div class="input-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" placeholder="correo@gmail.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" placeholder="Contraseña" required>
                </div>

                <button type="submit" class="btn-ingresar">Ingresar</button>
            </form>

            <script>
                // Lógica simple de redirección del lado del cliente para demo/pruebas
                document.getElementById('login-form').addEventListener('submit', function(e){
                    e.preventDefault();
                    var form = this;
                    if(!form.checkValidity()){ form.reportValidity(); return; }
                    var email = (document.getElementById('email').value || '').trim().toLowerCase();
                    // se solicita la contraseña pero no se verifica en esta demo
                    var password = (document.getElementById('password').value || '').trim();
                    if(!email){ alert('Ingrese un correo válido'); return; }
                    if(email === 'admin@gmail.com'){
                        window.location.href = 'dashboard_admin.html';
                        return;
                    }
                    if(email === 'coach@gmail.com'){
                        window.location.href = 'dashboard_coach.html';
                        return;
                    }
                    // cualquier otro correo -> usuario
                    window.location.href = 'dashboard_user.html';
                });
            </script>

            <hr class="divider">

            <div class="footer-links">
                <a href="recover.html">¿Olvidaste tu contraseña?</a>
                <span class="separator">|</span>
                <a href="register.html" class="btn-registrar">Registrarse</a>
            </div>

        </div>
    </div>

</body>
</html>
