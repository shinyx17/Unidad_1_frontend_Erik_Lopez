<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Tu Gimnasio</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="CSS/login.css">
</head>
<body class="auth-page">

    <div class="main-wrapper">
        <div class="login-box">
            
            <div class="logo-container">
                <div class="logo-placeholder">
                    <img src="CSS/logo_empresa_letra_v1.png" alt="Logo de la empresa">
                </div>
            </div>


            <form id="login-form">
                <div class="input-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" placeholder="usuario@sportclub.cl" required>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" placeholder="Contraseña" required>
                </div>

                <button type="submit" class="btn-ingresar">Ingresar</button>
            </form>

            <div id="error-message" class="error-message" style="display: none;"></div>

            <script src="users.js"></script>
            <script>
                // Lógica de validación de login
                document.getElementById('login-form').addEventListener('submit', function(e){
                    e.preventDefault();
                    var form = this;
                    if(!form.checkValidity()){ form.reportValidity(); return; }
                    var email = (document.getElementById('email').value || '').trim().toLowerCase();
                    var password = (document.getElementById('password').value || '').trim();
                    const errorDiv = document.getElementById('error-message');
                    
                    if(!email || !password){ 
                        errorDiv.textContent = 'Ingrese correo y contraseña';
                        errorDiv.style.display = 'block';
                        return; 
                    }

                    const result = validateLogin(email, password);
                    if (result.success) {
                        errorDiv.style.display = 'none';
                        // Redirigir según el rol
                        if (result.user.role === 'admin') {
                            window.location.href = 'dashboard_admin.html';
                        } else if (result.user.role === 'coach') {
                            window.location.href = 'dashboard_coach.html';
                        } else {
                            window.location.href = 'dashboard_user.html';
                        }
                    } else {
                        errorDiv.textContent = result.message;
                        errorDiv.style.display = 'block';
                    }
                });
            </script>

            <hr class="divider">

            <div class="footer-links">
                <a href="recover.html">¿Olvidaste tu contraseña?</a>
                <span class="separator">|</span>
                <a href="register.html" class="btn-registrar">Registrarse</a>
            </div>

        </div>
    </div>

</body>
</html>
