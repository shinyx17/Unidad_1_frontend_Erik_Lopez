<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Deportivo Pro</title>
    <link rel="stylesheet" href="CSS/index.css">
</head>
<body>

    <header>
        <h1>Club Deportivo Pro</h1>
        <nav>
            <a href="index.html">Inicio</a>
            <a href="about.html">Planes</a>
            <a href="contact.html">Reservas</a>
        </nav>
    </header>

    <main>
        <section>
            <h2>Bienvenido a Club Deportivo Pro</h2>
            <p>Entrena con los mejores profesionales de la industria del fitness</p>
            
            <div class="form-group">
                <label for="name">Nombre completo</label>
                <input type="text" id="name" placeholder="Juan Pérez">
            </div>

            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" placeholder="tu@email.com">
            </div>

            <div class="form-group">
                <label for="message">Mensaje</label>
                <textarea id="message" rows="4" placeholder="Cuéntanos sobre tu objetivo de entrenamiento..."></textarea>
            </div>

            <div class="button-group">
                <button class="btn-primary">Enviar</button>
                <button class="btn-secondary">Cancelar</button>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Club Deportivo Pro. Todos los derechos reservados.</p>
    </footer>
    
</body>
</html>
